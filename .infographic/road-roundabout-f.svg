<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="arrF" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="rgba(0,232,138,0.6)"/></marker>
    <marker id="arrFGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="rgba(0,232,138,0.9)"/></marker>
    <!-- Avatar clip paths -->
    <clipPath id="clip-f1"><circle cx="300" cy="175" r="33"/></clipPath>
    <clipPath id="clip-f2"><circle cx="500" cy="175" r="33"/></clipPath>
    <clipPath id="clip-f3"><circle cx="545" cy="270" r="33"/></clipPath>
    <clipPath id="clip-f4"><circle cx="500" cy="365" r="33"/></clipPath>
  </defs>

  <!-- Entry road (top center) -->
  <rect x="370" y="0" width="60" height="110" fill="#1c1c1c" rx="0"/>
  <line x1="371" y1="0" x2="371" y2="110" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="429" y1="0" x2="429" y2="110" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="110" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="12,8"/>

  <!-- Roundabout outer ring road (asphalt) -->
  <circle cx="400" cy="270" r="140" fill="none" stroke="#1c1c1c" stroke-width="54"/>
  <!-- Road edge markings -->
  <circle cx="400" cy="270" r="166" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="400" cy="270" r="114" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Road center dashed line -->
  <circle cx="400" cy="270" r="140" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="10,7"/>
  <!-- Center island (green fill) -->
  <circle cx="400" cy="270" r="86" fill="rgba(0,232,138,0.08)" stroke="rgba(0,232,138,0.35)" stroke-width="3"/>
  <!-- Island label -->
  <text x="400" y="262" text-anchor="middle" fill="rgba(0,232,138,0.7)" font-size="12" font-weight="800" font-family="Montserrat,sans-serif" letter-spacing="0.08em">RELEASE</text>
  <text x="400" y="280" text-anchor="middle" fill="rgba(0,232,138,0.7)" font-size="12" font-weight="800" font-family="Montserrat,sans-serif" letter-spacing="0.08em">&amp; DOCS</text>

  <!-- Clockwise flow arrows on the ring -->
  <path d="M 370 140 A 140 140 0 0 1 530 220" fill="none" stroke="rgba(0,232,138,0.4)" stroke-width="2.5" marker-end="url(#arrF)"/>
  <path d="M 530 320 A 140 140 0 0 1 370 400" fill="none" stroke="rgba(0,232,138,0.4)" stroke-width="2.5" marker-end="url(#arrF)"/>
  <path d="M 330 350 A 140 140 0 0 1 330 190" fill="none" stroke="rgba(0,232,138,0.4)" stroke-width="2.5" marker-end="url(#arrF)"/>

  <!-- Exit road (bottom center) -->
  <rect x="370" y="384" width="60" height="116" fill="#1c1c1c" rx="0"/>
  <line x1="371" y1="384" x2="371" y2="500" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="429" y1="384" x2="429" y2="500" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="400" y1="384" x2="400" y2="500" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-dasharray="12,8"/>

  <!-- "Next Cycle" path: dashed green curved path at bottom going back to the left -->
  <path d="M 370 490 C 300 490 200 470 150 430 C 80 390 60 340 80 290" fill="none" stroke="rgba(0,232,138,0.7)" stroke-width="2.5" stroke-dasharray="10,6" marker-end="url(#arrFGreen)"/>
  <text x="148" y="440" text-anchor="middle" fill="rgba(0,232,138,0.8)" font-size="8" font-weight="700" font-family="Montserrat,sans-serif" letter-spacing="0.04em">↺ NEXT CYCLE → ROUNDABOUT B</text>

  <!-- ═══ ROAD SIGN: FINISH LINE (left side) ═══ -->
  <rect x="88" y="200" width="5" height="50" fill="rgba(255,255,255,0.25)" rx="2"/>
  <rect x="30" y="140" width="120" height="62" rx="8" fill="#0a0a0a" stroke="rgba(0,232,138,0.5)" stroke-width="2"/>
  <text x="90" y="163" text-anchor="middle" fill="rgba(0,232,138,0.9)" font-size="14">🏁</text>
  <text x="90" y="182" text-anchor="middle" fill="#00E88A" font-size="9" font-weight="800" font-family="Montserrat,sans-serif" letter-spacing="0.06em">FINISH LINE</text>
  <text x="90" y="195" text-anchor="middle" fill="#7a7a7a" font-size="7" font-family="Montserrat,sans-serif">Release complete</text>

  <!-- ═══ ROAD SIGN: PARKING / VERSION TAGGED (right side) ═══ -->
  <rect x="688" y="230" width="5" height="50" fill="rgba(255,255,255,0.25)" rx="2"/>
  <rect x="640" y="170" width="120" height="62" rx="8" fill="#0a0a0a" stroke="rgba(255,184,0,0.5)" stroke-width="2"/>
  <text x="700" y="193" text-anchor="middle" fill="rgba(255,184,0,0.9)" font-size="14">📦</text>
  <text x="700" y="212" text-anchor="middle" fill="#FFB800" font-size="9" font-weight="800" font-family="Montserrat,sans-serif" letter-spacing="0.06em">PARKING</text>
  <text x="700" y="225" text-anchor="middle" fill="#7a7a7a" font-size="7" font-family="Montserrat,sans-serif">Version tagged</text>

  <!-- ═══ AVATAR 1: MANAGER (top-left ~10:30) ═══ -->
  <!-- Glow -->
  <circle cx="300" cy="175" r="38" fill="none" stroke="#FF4444" stroke-width="6" stroke-opacity="0.18"/>
  <!-- Border circle -->
  <circle cx="300" cy="175" r="35" fill="none" stroke="#FF4444" stroke-width="3"/>
  <!-- Clipped avatar -->
  <image href="../public/avatars/robots_40.jpg" x="267" y="142" width="66" height="66" clip-path="url(#clip-f1)"/>
  <!-- Title label -->
  <text x="300" y="225" text-anchor="middle" fill="#FF4444" font-size="9" font-weight="800" font-family="Montserrat,sans-serif" letter-spacing="0.06em">MANAGER</text>
  <!-- Description -->
  <text x="300" y="237" text-anchor="middle" fill="#7a7a7a" font-size="7" font-family="Montserrat,sans-serif">Approves release.</text>

  <!-- ═══ AVATAR 2: ORCHESTRATOR (top-right ~1:30) ═══ -->
  <!-- Glow -->
  <circle cx="500" cy="175" r="38" fill="none" stroke="#A764F6" stroke-width="6" stroke-opacity="0.18"/>
  <!-- Border circle -->
  <circle cx="500" cy="175" r="35" fill="none" stroke="#A764F6" stroke-width="3"/>
  <!-- Clipped avatar -->
  <image href="../public/avatars/robots_10.jpg" x="467" y="142" width="66" height="66" clip-path="url(#clip-f2)"/>
  <!-- Title label -->
  <text x="500" y="225" text-anchor="middle" fill="#A764F6" font-size="9" font-weight="800" font-family="Montserrat,sans-serif" letter-spacing="0.06em">ORCHESTRATOR</text>
  <!-- Description -->
  <text x="500" y="237" text-anchor="middle" fill="#7a7a7a" font-size="7" font-family="Montserrat,sans-serif">Orders release.</text>

  <!-- ═══ AVATAR 3: INTEGRATOR (right ~3:00) ═══ -->
  <!-- Glow -->
  <circle cx="545" cy="270" r="38" fill="none" stroke="#00E88A" stroke-width="6" stroke-opacity="0.18"/>
  <!-- Border circle -->
  <circle cx="545" cy="270" r="35" fill="none" stroke="#00E88A" stroke-width="3"/>
  <!-- Clipped avatar -->
  <image href="../public/avatars/robots_20.jpg" x="512" y="237" width="66" height="66" clip-path="url(#clip-f3)"/>
  <!-- Title label -->
  <text x="545" y="320" text-anchor="middle" fill="#00E88A" font-size="9" font-weight="800" font-family="Montserrat,sans-serif" letter-spacing="0.06em">INTEGRATOR</text>
  <!-- Description -->
  <text x="545" y="332" text-anchor="middle" fill="#7a7a7a" font-size="7" font-family="Montserrat,sans-serif">Merges. Tags. Builds. CI/CD.</text>

  <!-- ═══ AVATAR 4: ARCHITECT (bottom-right ~4:30) ═══ -->
  <!-- Glow -->
  <circle cx="500" cy="365" r="38" fill="none" stroke="#29B7FF" stroke-width="6" stroke-opacity="0.18"/>
  <!-- Border circle -->
  <circle cx="500" cy="365" r="35" fill="none" stroke="#29B7FF" stroke-width="3"/>
  <!-- Clipped avatar -->
  <image href="../public/avatars/robots_30.jpg" x="467" y="332" width="66" height="66" clip-path="url(#clip-f4)"/>
  <!-- Title label -->
  <text x="500" y="415" text-anchor="middle" fill="#29B7FF" font-size="9" font-weight="800" font-family="Montserrat,sans-serif" letter-spacing="0.06em">ARCHITECT</text>
  <!-- Description -->
  <text x="500" y="427" text-anchor="middle" fill="#7a7a7a" font-size="7" font-family="Montserrat,sans-serif">Writes docs, wiki, Mintlify.</text>
</svg>

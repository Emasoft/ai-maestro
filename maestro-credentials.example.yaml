# AI Maestro — Pre-configured Credentials
#
# Use this file to provision maestro users on headless boxes, cloud VMs,
# Docker containers, or any environment where you can't register via browser.
#
# USAGE:
#   1. Copy this file:  cp maestro-credentials.example.yaml maestro-credentials.yaml
#   2. Edit usernames and passwords
#   3. Run the installer:  ./install.sh -y
#      Or provision manually:  node scripts/provision-credentials.js maestro-credentials.yaml
#   4. The file is automatically DELETED after provisioning (security)
#
# You can also set the env var MAESTRO_CREDENTIALS_FILE=/path/to/file.yaml
# to use a custom path.
#
# SECURITY:
#   - This file contains PLAINTEXT passwords — do NOT commit to git
#   - maestro-credentials.yaml is in .gitignore
#   - The provisioning script deletes the file after reading it
#   - Use Docker secrets or env vars in production
#   - All users get MAESTRO privileges (full dashboard access)

users:
  - username: admin
    password: "change-me-to-a-strong-password"

